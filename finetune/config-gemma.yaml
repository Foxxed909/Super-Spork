# Spork × Gemma LoRA fine-tune config — the "together" run alongside Nemotron.
#
# Same export_dataset.ts output, same train_lora.py — just a different base model.
# Run it with:  python finetune/train_lora.py --config finetune/config-gemma.yaml
#
# Gemma 2 27B is a strong open model. 4-bit QLoRA on 27B wants ~40GB VRAM
# (A100 40GB / L40S 48GB / 2×24GB with offload). If you only have a single
# 24GB card, switch model_id to "google/gemma-2-9b-it" — everything else here
# works unchanged.
model_id: "google/gemma-2-27b-it"
# Gemma 2 requires eager attention during training (soft-capping).
attn_implementation: "eager"

# Dataset produced by export_dataset.ts (shared with the Nemotron run).
train_file: "finetune/data/train.jsonl"
val_file: "finetune/data/val.jsonl"

output_dir: "finetune/output/spork-gemma-lora"

lora:
  r: 16
  alpha: 32
  dropout: 0.05
  # Gemma 2 uses the same Llama-style projection names as Nemotron.
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj

train:
  epochs: 3
  batch_size: 1          # 27B is heavier — smaller micro-batch
  grad_accum: 16         # effective batch = 16 (matches the Nemotron run)
  lr: 0.0002
  warmup_ratio: 0.03
  max_seq_len: 4096
  packing: true
